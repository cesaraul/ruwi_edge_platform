services:

  # ── MQTT Broker ──────────────────────────────────────────────────────────────
  emqx:
    image: emqx/emqx:5.8
    container_name: ruwi_emqx
    restart: unless-stopped
    ports:
      - "1883:1883"     # MQTT (dispositivos)
      - "8083:8083"     # MQTT sobre WebSocket
      - "8883:8883"     # MQTT sobre TLS
      - "18083:18083"   # Dashboard admin
    environment:
      EMQX_NAME: ruwi_broker
      EMQX_HOST: "0.0.0.0"
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_ADMIN_PASSWORD}
      EMQX_LOG__CONSOLE__LEVEL: warning
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    networks:
      - iot_network
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Base de datos (TimescaleDB — ARM64 compatible) ────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: ruwi_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ruwi_iot
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - iot_network
    # Puerto expuesto solo para debug — comentar en producción
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ruwi_iot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Cache y Queue ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ruwi_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - iot_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ruwi_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      emqx:
        condition: service_healthy
    networks:
      - iot_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ruwi_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - iot_network

volumes:
  emqx_data:
  emqx_log:
  timescale_data:
  redis_data:

networks:
  iot_network:
    driver: bridge
